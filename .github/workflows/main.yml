name: demyx/openlitespeed

on:
  push:
    branches:
      - master
  schedule:
    - cron:  '0 0 * * 6'

jobs:
  master:
    runs-on: ubuntu-latest
    env:
      DEMYX_REPOSITORY: openlitespeed
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login
        uses: docker/login-action@v3
        with:
          username: demyx
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build
        run: |
          docker pull debian:buster-slim
          docker pull demyx/mariadb
          docker pull demyx/wordpress:cli
          docker build -t demyx/${{ env.DEMYX_REPOSITORY }} tag-latest
          docker build -t demyx/${{ env.DEMYX_REPOSITORY }}:bedrock tag-bedrock
      - name: Test
        id: test
        shell: 'script -q -e -c "bash {0}"'
        run: |
          demyx_test_logs() {
            echo "==== docker ps -a ===="
            docker ps -a || true
            echo ""

            for CONTAINER in demyx_db ${{ env.DEMYX_REPOSITORY }} demyx_db_bedrock ${{ env.DEMYX_REPOSITORY }}_bedrock; do
              echo "==== logs: ${CONTAINER} ===="
              docker logs "${CONTAINER}" || true
              echo ""
            done

            for CONTAINER in ${{ env.DEMYX_REPOSITORY }} ${{ env.DEMYX_REPOSITORY }}_bedrock; do
              echo "==== OpenLiteSpeed logs: ${CONTAINER} ===="
              docker exec "${CONTAINER}" sh -c "tail -n 100 /var/log/demyx/*.log" || true
              echo ""
            done
          }

          demyx_wait_for_http() {
            local CONTAINER="$1"
            local ATTEMPTS=30
            local SLEEP_SECONDS=4
            local TRY=

            for TRY in $(seq 1 "$ATTEMPTS"); do
              if ! docker inspect -f '{{.State.Running}}' "$CONTAINER" | grep -q true; then
                echo "Container is not running: $CONTAINER"
                return 1
              fi

              if docker exec "$CONTAINER" sh -c "wget -q --spider http://localhost"; then
                echo "HTTP ready: $CONTAINER"
                return 0
              fi

              echo "Waiting for HTTP on $CONTAINER (attempt $TRY/$ATTEMPTS)..."
              sleep "$SLEEP_SECONDS"
            done

            echo "Timed out waiting for HTTP on $CONTAINER"
            return 1
          }

          demyx_wait_for_wp_install() {
            local CONTAINER="$1"
            local WP_PATH="$2"
            local ATTEMPTS=30
            local SLEEP_SECONDS=4
            local TRY=

            for TRY in $(seq 1 "$ATTEMPTS"); do
              if docker exec "$CONTAINER" sh -c "wp core is-installed --path=$WP_PATH >/dev/null 2>&1"; then
                echo "WordPress installed: $CONTAINER ($WP_PATH)"
                return 0
              fi

              echo "Waiting for WordPress install on $CONTAINER (attempt $TRY/$ATTEMPTS)..."
              sleep "$SLEEP_SECONDS"
            done

            echo "Timed out waiting for WordPress install on $CONTAINER ($WP_PATH)"
            return 1
          }

          demyx_fail() {
            local MESSAGE="$1"
            echo "Tests failed - $MESSAGE"
            demyx_test_logs
            exit 1
          }

          docker network create demyx

          # tag-latest test
          docker run -d \
            --name=demyx_db \
            --network=demyx \
            -e DEMYX_DATABASE=demyx \
            -e DEMYX_USERNAME=demyx \
            -e DEMYX_PASSWORD=demyx \
            -e DEMYX_ROOT_PASSWORD=demyx \
            demyx/mariadb

          sleep 15

          docker run -d \
            --name=${{ env.DEMYX_REPOSITORY }} \
            --network=demyx \
            -v ${{ env.DEMYX_REPOSITORY }}:/demyx \
            -e DEMYX_DB_HOST=demyx_db \
            -e DEMYX_DB_NAME=demyx \
            -e DEMYX_DB_USERNAME=demyx \
            -e DEMYX_DB_PASSWORD=demyx \
            -e DEMYX_DOMAIN=localhost \
            demyx/${{ env.DEMYX_REPOSITORY }}

          # tag-bedrock test
          docker run -d \
            --name=demyx_db_bedrock \
            --network=demyx \
            -e DEMYX_DATABASE=demyx \
            -e DEMYX_USERNAME=demyx \
            -e DEMYX_PASSWORD=demyx \
            -e DEMYX_ROOT_PASSWORD=demyx \
            demyx/mariadb

          sleep 15

          docker run -d \
            --name=${{ env.DEMYX_REPOSITORY }}_bedrock \
            --network=demyx \
            -v ${{ env.DEMYX_REPOSITORY }}_bedrock:/demyx \
            -e DEMYX_DB_HOST=demyx_db_bedrock \
            -e DEMYX_DB_NAME=demyx \
            -e DEMYX_DB_USERNAME=demyx \
            -e DEMYX_DB_PASSWORD=demyx \
            -e DEMYX_DOMAIN=localhost \
            demyx/${{ env.DEMYX_REPOSITORY }}:bedrock

          sleep 5

          # Infra health: ensure all test containers are running
          for CONTAINER in demyx_db ${{ env.DEMYX_REPOSITORY }} demyx_db_bedrock ${{ env.DEMYX_REPOSITORY }}_bedrock; do
            if ! docker inspect -f '{{.State.Running}}' "$CONTAINER" | grep -q true; then
              demyx_fail "container is not running: $CONTAINER"
            fi
          done

          # Service health: wait for local HTTP readiness
          demyx_wait_for_http "${{ env.DEMYX_REPOSITORY }}" || demyx_fail "tag-latest HTTP endpoint not ready"
          demyx_wait_for_http "${{ env.DEMYX_REPOSITORY }}_bedrock" || demyx_fail "tag-bedrock HTTP endpoint not ready"

          # Service health: require HTTP status success
          docker exec ${{ env.DEMYX_REPOSITORY }} sh -c "wget -q --spider http://localhost" || demyx_fail "tag-latest HTTP check failed"
          docker exec ${{ env.DEMYX_REPOSITORY }}_bedrock sh -c "wget -q --spider http://localhost" || demyx_fail "tag-bedrock HTTP check failed"

          # App readiness: verify WordPress install on both variants
          demyx_wait_for_wp_install "${{ env.DEMYX_REPOSITORY }}" "/demyx" || demyx_fail "tag-latest WordPress not installed"
          demyx_wait_for_wp_install "${{ env.DEMYX_REPOSITORY }}_bedrock" "/demyx/web/wp" || demyx_fail "tag-bedrock WordPress not installed"

          # Bedrock sanity: expected structure and wp-cli command path
          docker exec ${{ env.DEMYX_REPOSITORY }}_bedrock sh -c "test -d /demyx/web/wp" || demyx_fail "tag-bedrock missing /demyx/web/wp"
          docker exec ${{ env.DEMYX_REPOSITORY }}_bedrock sh -c "wp core version --path=/demyx/web/wp >/dev/null 2>&1" || demyx_fail "tag-bedrock wp-cli core version failed"

          echo "Tests passed - infra, service, and app readiness checks succeeded."
      - name: Version
        run: |
          DEMYX_OPENLITESPEED_DEBIAN_VERSION="$(docker exec ${{ env.DEMYX_REPOSITORY }} cat /etc/debian_version)"
          DEMYX_OPENLITESPEED_VERSION="$(docker exec ${{ env.DEMYX_REPOSITORY }} cat /usr/local/lsws/VERSION)"
          DEMYX_OPENLITESPEED_LSPHP_VERSION="$(docker exec ${{ env.DEMYX_REPOSITORY }} sh -c '/usr/local/lsws/lsphp82/bin/php -v' | head -1 | awk '{print $2}')"
          DEMYX_OPENLITESPEED_LSPHP_LATEST_VERSION="$(docker exec ${{ env.DEMYX_REPOSITORY }} sh -c '/usr/local/lsws/lsphp83/bin/php -v' | head -1 | awk '{print $2}')"
          DEMYX_JQ="$(jq ".debian = \"$DEMYX_OPENLITESPEED_DEBIAN_VERSION\" | .openlitespeed = \"$DEMYX_OPENLITESPEED_VERSION\" | .lsphp82 = \"$DEMYX_OPENLITESPEED_LSPHP_VERSION\" | .lsphp83 = \"$DEMYX_OPENLITESPEED_LSPHP_LATEST_VERSION\"" version.json)"

          # Update versions
          echo "$DEMYX_JQ" > version.json
          echo "DEMYX_OPENLITESPEED_DEBIAN_VERSION=$DEMYX_OPENLITESPEED_DEBIAN_VERSION
          DEMYX_OPENLITESPEED_VERSION=$DEMYX_OPENLITESPEED_VERSION
          DEMYX_OPENLITESPEED_LSPHP_VERSION=$DEMYX_OPENLITESPEED_LSPHP_VERSION
          DEMYX_OPENLITESPEED_LSPHP_LATEST_VERSION=$DEMYX_OPENLITESPEED_LSPHP_LATEST_VERSION" > VERSION
      - name: Push
        run: |
          # Not sure why this is being created?
          [[ -f typescript ]] && rm -f typescript

          DEMYX_CHECK_STATUS="$(git status)"
          if [[ "$DEMYX_CHECK_STATUS" != *"nothing to commit"* ]]; then
            git config --global user.name github-actions[bot]
            git config --global user.email github-actions[bot]@users.noreply.github.com
            git remote set-url origin https://demyxsh:${{ secrets.DEMYX_TOKEN }}@github.com/demyxsh/${{ env.DEMYX_REPOSITORY }}
            git add .
            git commit -m "Schedule Build #${{ github.run_id }}"
            git push
          fi

          docker push demyx/${{ env.DEMYX_REPOSITORY }}
          docker push demyx/${{ env.DEMYX_REPOSITORY }}:bedrock
